<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>

/* BASE */
body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family: Arial, sans-serif;

    background: linear-gradient(135deg,#ffe4f1,#ffffff,#ffeaf6);

    overflow:hidden;
}

/* FLOATING LIGHTS */
body::before{
    content:"";

    position:fixed;
    inset:0;

    background-image:
        radial-gradient(#ffb6d9 2px, transparent 2px),
        radial-gradient(#ffffff 1px, transparent 1px);

    background-size:60px 60px, 30px 30px;

    opacity:0.2;

    pointer-events:none;
}

/* ENVELOPE */
.mail{
    width:320px;
    height:220px;

    background:#fff;

    border-radius:20px;

    position:relative;

    box-shadow:0 20px 40px rgba(255,105,180,0.25);

    cursor:pointer;

    transition:0.3s ease;
}

.mail:hover{
    transform:scale(1.03);
}

/* TOP FLAP */
.mail::before{
    content:"";

    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:50%;

    background:linear-gradient(135deg,#ffd1e8,#ff9acb);

    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border-top-left-radius:20px;
    border-top-right-radius:20px;
}

/* HEART SEAL */
.seal{
    position:absolute;

    top:55%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:28px;

    color:#ff4fa3;

    background:white;

    width:60px;
    height:60px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:0 10px 20px rgba(255,105,180,0.2);
}

/* TEXT */
.label{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;

    color:#6a4a57;

    font-size:14px;
}

/* CLICK EFFECT */
.mail:active{
    transform:scale(0.98);
}

</style>

</head>

<body>

<div class="mail" onclick="openLetter()">

    <div class="seal">💌</div>

    <div class="label">Tap to open</div>

</div>

<!-- MUSIC -->
<audio id="bgm" loop>
    <source src="CC.mp3" type="audio/mp3">
</audio>

<script>
function openLetter(){

    const music = document.getElementById("bgm");

    music.play().catch(()=>{});

    // small delay for effect
    setTimeout(()=>{
        window.location.href = "Page1.html";
    }, 600);
}
</script>

</body>
</html>
